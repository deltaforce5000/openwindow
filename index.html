<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#EAF0F4">
<title>Open Window</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  background: linear-gradient(168deg, #F2F5F8 0%, #EAF0F4 55%, #EDF1F0 100%);
  color: #1A1D21; overflow-x: hidden; position: relative;
  padding-top: env(safe-area-inset-top);
}
.blob { position: fixed; width: 60vmax; height: 60vmax; border-radius: 50%; filter: blur(70px); transition: background 1.2s ease; pointer-events: none; z-index: 0; }
#b1 { top: -22vmax; right: -18vmax; }
#b2 { bottom: -26vmax; left: -20vmax; }
.frame { position: relative; max-width: 430px; margin: 0 auto; padding: 18px 18px calc(28px + env(safe-area-inset-bottom)); z-index: 1; }

.hdr { display: flex; justify-content: space-between; align-items: center; padding: 6px 2px 16px; }
.loc-pill {
  display: inline-flex; align-items: center; gap: 8px; border: none; cursor: pointer;
  background: rgba(255,255,255,.62); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 999px; padding: 10px 16px; font-size: 15px; font-weight: 600; color: #1A1D21;
  box-shadow: 0 2px 12px rgba(20,40,60,.08), inset 0 1px 0 rgba(255,255,255,.8);
  font-family: inherit;
}
.loc-dot { width: 7px; height: 7px; border-radius: 50%; background: #3BB98F; box-shadow: 0 0 8px #3BB98F; }
.chev { opacity: .4; font-size: 17px; }
.icon-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; color: #5A6472;
  background: rgba(255,255,255,.62); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 2px 12px rgba(20,40,60,.08), inset 0 1px 0 rgba(255,255,255,.8);
  display: grid; place-items: center;
}

.orb-wrap { display: grid; place-items: center; padding: 14px 0 18px; }
.orb {
  width: 290px; height: 290px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  color: #fff; text-align: center; animation: breathe 5.5s ease-in-out infinite;
  transition: background 1s ease, box-shadow 1s ease;
}
.orb h1 { margin: 6px 0 0; font-size: 32px; font-weight: 800; letter-spacing: -.6px; text-shadow: 0 2px 14px rgba(0,0,0,.14); }
.orb p { margin: 2px 18px 0; font-size: 14px; font-weight: 500; opacity: .92; }
.score-pill {
  margin-top: 12px; background: rgba(255,255,255,.26); border: 1px solid rgba(255,255,255,.4);
  border-radius: 999px; padding: 5px 14px; font-size: 15px; font-weight: 700; backdrop-filter: blur(8px);
}
.score-pill span { font-size: 11px; font-weight: 600; opacity: .8; }
@keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.022); } }
@media (prefers-reduced-motion: reduce) { .orb, .skel { animation: none !important; } }
.breeze { animation: drift 2.4s ease-in-out infinite; }
@keyframes drift { 0%,100% { transform: translateX(0); opacity: .9; } 50% { transform: translateX(4px); opacity: .5; } }
.win-frame-pane { transform-origin: 18px 48px; transition: transform .9s cubic-bezier(.32,1.2,.36,1); }
.skel { width: 290px; height: 290px; border-radius: 50%; margin: 14px auto; background: rgba(255,255,255,.5); animation: breathe 1.6s ease-in-out infinite; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 0 4px 18px; }
.chip {
  font-size: 12.5px; font-weight: 600; padding: 7px 12px; border-radius: 999px;
  background: rgba(255,255,255,.66); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: 0 1px 8px rgba(20,40,60,.06);
}
.chip.g { color: #0E6B5C; } .chip.b { color: #8F4040; }

.card {
  background: rgba(255,255,255,.62); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.72); border-radius: 26px; padding: 18px 18px 16px; margin-bottom: 14px;
  box-shadow: 0 8px 32px rgba(25,45,70,.07), inset 0 1px 0 rgba(255,255,255,.85);
}
.card-eyebrow {
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #7A8494;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px; justify-content: space-between;
}
.best-tag { background: rgba(59,185,143,.14); color: #0E6B5C; padding: 4px 10px; border-radius: 999px; letter-spacing: .2px; text-transform: none; font-size: 12px; }

.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.stat { text-align: center; }
.stat-v { font-size: 21px; font-weight: 750; letter-spacing: -.4px; }
.stat-l { font-size: 11px; color: #7A8494; font-weight: 600; margin-top: 2px; }

.dewbar { display: grid; grid-template-columns: 86px 1fr 44px; align-items: center; gap: 10px; margin-bottom: 10px; }
.dew-l { font-size: 12.5px; font-weight: 600; color: #5A6472; }
.dew-track { height: 10px; border-radius: 999px; background: rgba(120,140,165,.16); overflow: hidden; }
.dew-track i { display: block; height: 100%; border-radius: 999px; transition: width .8s cubic-bezier(.3,1,.4,1); }
.dew-v { font-size: 13px; font-weight: 700; text-align: right; }
.fine { font-size: 13px; color: #5A6472; line-height: 1.5; margin: 8px 0 0; }

.strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.strip::-webkit-scrollbar { display: none; }
.hr-chip {
  flex: 0 0 52px; display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 4px; border-radius: 16px; background: rgba(255,255,255,.4);
}
.hr-chip.hl { background: rgba(59,185,143,.16); box-shadow: inset 0 0 0 1.5px rgba(59,185,143,.35); }
.hr-t { font-size: 11px; font-weight: 700; color: #5A6472; }
.hr-g { font-size: 16px; }
.hr-d { font-size: 12px; font-weight: 600; }
.hr-bar { width: 6px; height: 34px; border-radius: 999px; background: rgba(120,140,165,.15); display: flex; align-items: flex-end; overflow: hidden; }
.hr-bar i { display: block; width: 100%; border-radius: 999px; }

.pollen { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

.mold-row { display: flex; justify-content: space-between; align-items: center; }
.mold-big { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
.mold-sub { font-size: 12px; color: #7A8494; font-weight: 600; }
.badge { color: #fff; font-size: 13px; font-weight: 700; padding: 7px 14px; border-radius: 999px; }
.spark { width: 100%; height: 44px; margin-top: 14px; }
.spark-l { font-size: 11px; color: #98A1AF; font-weight: 600; margin-top: 4px; }

.ftr { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px 0; font-size: 12px; color: #98A1AF; }
.refresh { border: none; background: rgba(255,255,255,.7); border-radius: 999px; padding: 9px 18px; font-size: 13px; font-weight: 700; color: #1A1D21; cursor: pointer; box-shadow: 0 2px 10px rgba(20,40,60,.08); font-family: inherit; }

.err { text-align: center; } .err p { margin: 4px 0 12px; font-weight: 600; }
.retry { border: none; background: #1A1D21; color: #fff; border-radius: 999px; padding: 10px 22px; font-weight: 700; cursor: pointer; font-family: inherit; }

.sheet-bg { position: fixed; inset: 0; background: rgba(20,28,38,.32); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; z-index: 50; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; } }
.sheet {
  width: 100%; max-width: 430px; max-height: 78vh; overflow-y: auto;
  background: rgba(248,250,252,.92); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  border-radius: 30px 30px 0 0; padding: 10px 20px calc(34px + env(safe-area-inset-bottom)); animation: rise .35s cubic-bezier(.3,1.1,.4,1);
}
@keyframes rise { from { transform: translateY(40px); opacity: 0; } }
.sheet-grab { width: 40px; height: 5px; border-radius: 999px; background: rgba(120,135,155,.35); margin: 4px auto 12px; }
.sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.sheet-head h2 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -.4px; }
.sheet-x { border: none; width: 32px; height: 32px; border-radius: 50%; background: rgba(120,135,155,.14); color: #5A6472; font-size: 13px; cursor: pointer; }

.search-in {
  width: 100%; border: none; outline: none; font-size: 16px; font-weight: 500;
  background: rgba(255,255,255,.85); border-radius: 16px; padding: 14px 16px;
  box-shadow: inset 0 0 0 1px rgba(120,140,165,.18); font-family: inherit;
}
.res-row {
  width: 100%; text-align: left; border: none; cursor: pointer; background: transparent;
  padding: 13px 8px; border-radius: 14px; display: flex; flex-direction: column; gap: 2px; font-family: inherit;
}
.res-row:hover, .res-row:focus-visible { background: rgba(255,255,255,.8); }
.res-name { font-size: 16px; font-weight: 650; }
.res-sub { font-size: 12.5px; color: #7A8494; }

.sl { margin-bottom: 20px; }
.sl-head { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: #3A424E; margin-bottom: 8px; }
.sl input[type=range] { width: 100%; accent-color: #4E9FD6; height: 30px; }

.hk-card { background: rgba(255,255,255,.75); border-radius: 20px; padding: 16px; margin-top: 6px; box-shadow: inset 0 0 0 1px rgba(120,140,165,.14); }
.hk-top { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
.hk-ic { font-size: 22px; width: 44px; height: 44px; display: grid; place-items: center; background: linear-gradient(140deg,#FBD786,#f7797d); border-radius: 12px; color: #fff; }
.hk-t { font-size: 15px; font-weight: 700; }
.hk-s { font-size: 12.5px; color: #7A8494; }
.hk-btn { width: 100%; border: none; border-radius: 14px; padding: 12px; font-weight: 700; font-size: 14px; background: rgba(120,135,155,.14); color: #98A1AF; font-family: inherit; }

button:focus-visible, input:focus-visible { outline: 2px solid #4E9FD6; outline-offset: 2px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="blob" id="b1"></div>
<div class="blob" id="b2"></div>

<div class="frame">
  <header class="hdr">
    <button class="loc-pill" id="locBtn">
      <span class="loc-dot"></span><span id="locName">Zushi</span><span class="chev">›</span>
    </button>
    <button class="icon-btn" id="sensorBtn" aria-label="Indoor sensors">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2.6" fill="#fff"/>
        <line x1="4" y1="16" x2="20" y2="16"/><circle cx="15" cy="16" r="2.6" fill="#fff"/>
      </svg>
    </button>
  </header>
  <div id="content"><div class="skel"></div></div>
</div>

<div class="sheet-bg hidden" id="searchSheet">
  <div class="sheet">
    <div class="sheet-grab"></div>
    <div class="sheet-head"><h2>Choose location</h2><button class="sheet-x" data-close>✕</button></div>
    <input class="search-in" id="searchIn" placeholder="Search any city…" autocomplete="off">
    <div id="searchRes" style="margin-top:10px"></div>
  </div>
</div>

<div class="sheet-bg hidden" id="sensorSheet">
  <div class="sheet">
    <div class="sheet-grab"></div>
    <div class="sheet-head"><h2>Indoor conditions</h2><button class="sheet-x" data-close>✕</button></div>
    <div class="sl">
      <div class="sl-head"><span>Indoor temperature</span><b id="tVal">23°C</b></div>
      <input type="range" id="tSlider" min="10" max="32" step="0.5" value="23">
    </div>
    <div class="sl">
      <div class="sl-head"><span>Indoor humidity</span><b id="hVal">55%</b></div>
      <input type="range" id="hSlider" min="20" max="90" step="1" value="55">
    </div>
    <div class="hk-card">
      <div class="hk-top">
        <span class="hk-ic">⌂</span>
        <div>
          <div class="hk-t">HomeKit / Matter sensors</div>
          <div class="hk-s">Pull live readings from your home hub</div>
        </div>
      </div>
      <button class="hk-btn" disabled>Requires native app</button>
      <p class="fine" style="margin-top:8px">Browsers can't reach HomeKit. Wrap this app with Capacitor and this panel connects to your hub automatically.</p>
    </div>
  </div>
</div>

<script>
"use strict";
/* ───── psychrometrics ───── */
const MA = 17.62, MB = 243.12;
const dewPoint = (T, RH) => { const g = Math.log(Math.max(RH,1)/100) + (MA*T)/(MB+T); return (MB*g)/(MA-g); };
const rhFromDew = (T, Td) => Math.min(100, Math.max(2, 100*Math.exp((MA*Td)/(MB+Td) - (MA*T)/(MB+T))));

/* ───── verdict engine ───── */
function scoreConditions(o) {
  const dpIn = dewPoint(o.indoorT, o.indoorRH);
  const delta = o.dpOut - dpIn;
  let score = 50; const reasons = [];
  if (delta <= -3)      { score += 35; reasons.push({g:1,t:"Outdoor air is much drier — airing lowers indoor humidity"}); }
  else if (delta <= -1) { score += 22; reasons.push({g:1,t:"Outdoor air is drier than inside"}); }
  else if (delta < 1.5) { score += 4;  reasons.push({g:1,t:"Moisture levels roughly equal — neutral for mold"}); }
  else if (delta < 4)   { score -= 22; reasons.push({g:0,t:"Outdoor air carries more moisture — it would raise indoor humidity"}); }
  else                  { score -= 38; reasons.push({g:0,t:"Outdoor air is far damper — opening feeds mold"}); }

  if (o.precip > 0.2)        { score -= 25; reasons.push({g:0,t:"It's raining right now"}); }
  else if (o.precipProb >= 60){ score -= 12; reasons.push({g:0,t:`Rain likely (${Math.round(o.precipProb)}%)`}); }

  if (o.pm25 != null) {
    if (o.pm25 > 35)      { score -= 30; reasons.push({g:0,t:`PM2.5 is poor (${Math.round(o.pm25)} µg/m³)`}); }
    else if (o.pm25 > 15) { score -= 10; reasons.push({g:0,t:`PM2.5 slightly elevated (${Math.round(o.pm25)} µg/m³)`}); }
    else                  { score += 6;  reasons.push({g:1,t:"Air is clean"}); }
  }
  if (o.wind != null) {
    if (o.wind > 40)     { score -= 14; reasons.push({g:0,t:"Very windy — secure anything loose"}); }
    else if (o.wind >= 8){ score += 6;  reasons.push({g:1,t:"A breeze will speed up the air exchange"}); }
    else                 { reasons.push({g:1,t:"Still air — air out a little longer"}); }
  }
  if (o.tOut < 2)       { score -= 12; reasons.push({g:0,t:"Freezing outside — short bursts only"}); }
  else if (o.tOut < 10) { score -= 4;  reasons.push({g:0,t:"Chilly — a quick 5-minute burst works best"}); }
  else if (o.tOut > 33) { score -= 10; reasons.push({g:0,t:"Very hot — you'll trade humidity for heat"}); }

  return { score: Math.max(0, Math.min(100, Math.round(score))), reasons, delta, dpIn };
}
const verdictOf = s =>
  s >= 68 ? {key:"open",   title:"Open up",      sub:"Conditions favor airing out"} :
  s >= 42 ? {key:"maybe",  title:"Brief airing", sub:"Okay for 5–10 minutes, then close"} :
            {key:"closed", title:"Keep closed",  sub:"Opening now does more harm than good"};
const moldBand = rh =>
  rh < 55 ? {label:"Low", tone:"#3BB98F"} : rh < 65 ? {label:"Moderate", tone:"#E0A93E"} :
  rh < 75 ? {label:"Elevated", tone:"#E08348"} : {label:"High", tone:"#D9596B"};
const wxGlyph = c =>
  c===0?"☀️":c<=2?"🌤":c===3?"☁️":c<=48?"🌫":c<=57?"🌦":c<=67?"🌧":c<=77?"🌨":c<=82?"🌧":c<=86?"🌨":"⛈";
const pm25Band = v => v==null?"–":v<=12?"Good":v<=35?"Fair":v<=55?"Poor":"Bad";

const PAL = {
  open:  {a:"#6ECFB8",b:"#5BAFE0",glow:"rgba(94,196,182,.45)",t1:"rgba(110,207,184,.20)",t2:"rgba(91,175,224,.18)"},
  maybe: {a:"#EFC069",b:"#E09058",glow:"rgba(232,164,94,.42)",t1:"rgba(239,192,105,.20)",t2:"rgba(224,144,88,.16)"},
  closed:{a:"#E58787",b:"#C96A8C",glow:"rgba(222,118,132,.40)",t1:"rgba(229,135,135,.18)",t2:"rgba(201,106,140,.16)"}
};

/* ───── state + persistence (localStorage) ───── */
const store = {
  get(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
  set(k, v)  { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
let loc      = store.get("owc-loc", { name:"Zushi", country:"Japan", lat:35.2956, lon:139.5803 });
let settings = store.get("owc-settings", { indoorT:23, indoorRH:55 });
let history  = store.get("owc-history", []);
let wx = null, aq = null, updatedAt = null, loading = false;

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ───── fetch ───── */
async function fetchAll() {
  loading = true;
  if (!wx) $("content").innerHTML = '<div class="skel"></div>';
  try {
    const base = `latitude=${loc.lat}&longitude=${loc.lon}&timezone=auto`;
    const wxUrl = `https://api.open-meteo.com/v1/forecast?${base}` +
      `&current=temperature_2m,relative_humidity_2m,dew_point_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m` +
      `&hourly=temperature_2m,relative_humidity_2m,dew_point_2m,precipitation_probability,precipitation,weather_code,wind_speed_10m&forecast_days=2`;
    const aqUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?${base}` +
      `&current=pm2_5,pm10,us_aqi,alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen` +
      `&hourly=pm2_5&forecast_days=2`;
    const [wr, ar] = await Promise.all([fetch(wxUrl), fetch(aqUrl).catch(() => null)]);
    if (!wr.ok) throw new Error("Weather service unavailable");
    wx = await wr.json();
    aq = ar && ar.ok ? await ar.json() : null;
    updatedAt = new Date();
    // history snapshot — outdoor moisture trend, deduped within 20 min
    const last = history[history.length-1];
    if (!last || Date.now() - last.ts > 20*60*1000) {
      history.push({ ts: Date.now(), dp: wx.current.dew_point_2m });
      history = history.slice(-72);
      store.set("owc-history", history);
    }
    render();
  } catch (e) {
    $("content").innerHTML =
      `<div class="card err"><p>${esc(e.message || "Couldn't reach the weather service")}</p>
       <button class="retry" onclick="fetchAll()">Try again</button></div>`;
  } finally { loading = false; }
}

/* ───── render ───── */
function render() {
  if (!wx) return;
  const c = wx.current;
  const cur = scoreConditions({
    tOut:c.temperature_2m, rhOut:c.relative_humidity_2m, dpOut:c.dew_point_2m,
    precip:c.precipitation, precipProb:0, wind:c.wind_speed_10m,
    pm25: aq?.current?.pm2_5 ?? null, indoorT:settings.indoorT, indoorRH:settings.indoorRH
  });
  const verdict = verdictOf(cur.score);
  const pal = PAL[verdict.key];
  $("b1").style.background = pal.t1;
  $("b2").style.background = pal.t2;
  $("locName").textContent = loc.name;

  /* hourly outlook */
  const H = wx.hourly, nowIso = c.time.slice(0,13);
  let i0 = H.time.findIndex(t => t.slice(0,13) === nowIso); if (i0 < 0) i0 = 0;
  const aqByHour = {};
  if (aq?.hourly) aq.hourly.time.forEach((t,i) => aqByHour[t] = aq.hourly.pm2_5[i]);
  const hours = [];
  for (let i = i0; i < Math.min(i0+24, H.time.length); i++) {
    const r = scoreConditions({
      tOut:H.temperature_2m[i], rhOut:H.relative_humidity_2m[i], dpOut:H.dew_point_2m[i],
      precip:H.precipitation[i], precipProb:H.precipitation_probability[i], wind:H.wind_speed_10m[i],
      pm25: aqByHour[H.time[i]] ?? null, indoorT:settings.indoorT, indoorRH:settings.indoorRH
    });
    hours.push({ time:H.time[i], code:H.weather_code[i], temp:H.temperature_2m[i], score:r.score });
  }
  let best = null, run = null;
  hours.forEach((h, idx) => {
    if (h.score >= 65) run = run ? {...run, end:idx} : {start:idx, end:idx};
    else { if (run && (!best || run.end-run.start > best.end-best.start)) best = run; run = null; }
  });
  if (run && (!best || run.end-run.start > best.end-best.start)) best = run;

  const rhAfter = rhFromDew(settings.indoorT, c.dew_point_2m);
  const mb = moldBand(settings.indoorRH);
  const fmtH = iso => new Date(iso).toLocaleTimeString([], {hour:"numeric"});
  const winAngle = verdict.key === "open" ? 52 : verdict.key === "maybe" ? 22 : 0;
  const dewW = td => Math.min(100, Math.max(4, (td/28)*100));

  const pollenKinds = aq?.current ? [
    ["Alder",aq.current.alder_pollen],["Birch",aq.current.birch_pollen],["Grass",aq.current.grass_pollen],
    ["Mugwort",aq.current.mugwort_pollen],["Olive",aq.current.olive_pollen],["Ragweed",aq.current.ragweed_pollen]
  ].filter(([,v]) => v != null && v > 0) : [];

  let spark = "";
  if (history.length > 2) {
    const data = history.map(h => h.dp), w = 280, hgt = 44;
    const mn = Math.min(...data), mx = Math.max(...data), sp = (mx-mn)||1;
    const pts = data.map((v,i) => `${(i/(data.length-1))*w},${hgt-4-((v-mn)/sp)*(hgt-8)}`).join(" ");
    spark = `<svg class="spark" viewBox="0 0 ${w} ${hgt}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${pal.b}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="spark-l">Outdoor moisture trend · last ${history.length} checks</div>`;
  }

  $("content").innerHTML = `
  <section class="orb-wrap">
    <div class="orb" style="background:radial-gradient(circle at 32% 28%, ${pal.a}, ${pal.b} 78%);box-shadow:0 24px 80px ${pal.glow}, inset 0 1px 0 rgba(255,255,255,.5)">
      <svg width="84" height="84" viewBox="0 0 96 96" fill="none">
        <rect x="14" y="10" width="68" height="76" rx="8" stroke="rgba(255,255,255,.9)" stroke-width="4"/>
        <g class="win-frame-pane" style="transform:perspective(220px) rotateY(${winAngle}deg)">
          <rect x="20" y="16" width="56" height="64" rx="5" fill="rgba(255,255,255,.22)" stroke="rgba(255,255,255,.95)" stroke-width="3.5"/>
          <line x1="48" y1="18" x2="48" y2="78" stroke="rgba(255,255,255,.8)" stroke-width="3"/>
        </g>
        ${verdict.key === "open" ? `<g class="breeze">
          <path d="M86 34 q8 3 0 7" stroke="rgba(255,255,255,.85)" stroke-width="3" stroke-linecap="round" fill="none"/>
          <path d="M88 50 q10 4 0 9" stroke="rgba(255,255,255,.6)" stroke-width="3" stroke-linecap="round" fill="none"/></g>` : ""}
      </svg>
      <h1>${verdict.title}</h1>
      <p>${verdict.sub}</p>
      <div class="score-pill">${cur.score}<span>/100</span></div>
    </div>
  </section>

  <section class="chips">
    ${cur.reasons.slice(0,4).map(r => `<span class="chip ${r.g?"g":"b"}">${r.g?"✓":"•"} ${esc(r.t)}</span>`).join("")}
  </section>

  <section class="card">
    <div class="card-eyebrow">Outside now · ${wxGlyph(c.weather_code)}</div>
    <div class="grid4">
      <div class="stat"><div class="stat-v">${Math.round(c.temperature_2m)}°</div><div class="stat-l">Temp</div></div>
      <div class="stat"><div class="stat-v">${Math.round(c.relative_humidity_2m)}%</div><div class="stat-l">Humidity</div></div>
      <div class="stat"><div class="stat-v">${c.dew_point_2m.toFixed(1)}°</div><div class="stat-l">Dew point</div></div>
      <div class="stat"><div class="stat-v">${Math.round(c.wind_speed_10m)}</div><div class="stat-l">Wind km/h</div></div>
    </div>
  </section>

  <section class="card">
    <div class="card-eyebrow">Moisture balance</div>
    <div class="dewbar"><span class="dew-l">Inside (est.)</span>
      <div class="dew-track"><i style="width:${dewW(cur.dpIn)}%;background:#7C8DB5"></i></div>
      <span class="dew-v">${cur.dpIn.toFixed(1)}°</span></div>
    <div class="dewbar"><span class="dew-l">Outside</span>
      <div class="dew-track"><i style="width:${dewW(c.dew_point_2m)}%;background:${pal.b}"></i></div>
      <span class="dew-v">${c.dew_point_2m.toFixed(1)}°</span></div>
    <p class="fine">${
      cur.delta <= -1 ? `Outdoor dew point is ${Math.abs(cur.delta).toFixed(1)}° lower — airing dries your home.` :
      cur.delta < 1.5 ? "Nearly identical moisture loads — neutral exchange." :
      `Outdoor dew point is ${cur.delta.toFixed(1)}° higher — opening pulls moisture in.`}</p>
  </section>

  <section class="card">
    <div class="card-eyebrow">Next 24 hours
      ${best ? `<span class="best-tag">Best ${fmtH(hours[best.start].time)}–${fmtH(hours[best.end].time)}</span>` : ""}
    </div>
    <div class="strip">
      ${hours.map((h,i) => {
        const inBest = best && i >= best.start && i <= best.end;
        const tone = h.score >= 68 ? "#3BB98F" : h.score >= 42 ? "#E0A93E" : "#D9596B";
        return `<div class="hr-chip ${inBest?"hl":""}">
          <span class="hr-t">${i===0?"Now":fmtH(h.time)}</span>
          <span class="hr-g">${wxGlyph(h.code)}</span>
          <span class="hr-d">${Math.round(h.temp)}°</span>
          <span class="hr-bar"><i style="height:${Math.max(8,h.score)}%;background:${tone}"></i></span>
        </div>`;
      }).join("")}
    </div>
  </section>

  ${aq?.current ? `<section class="card">
    <div class="card-eyebrow">Air quality</div>
    <div class="grid4">
      <div class="stat"><div class="stat-v">${aq.current.us_aqi ?? "–"}</div><div class="stat-l">US AQI</div></div>
      <div class="stat"><div class="stat-v">${aq.current.pm2_5 != null ? aq.current.pm2_5.toFixed(0) : "–"}</div><div class="stat-l">PM2.5</div></div>
      <div class="stat"><div class="stat-v">${aq.current.pm10 != null ? aq.current.pm10.toFixed(0) : "–"}</div><div class="stat-l">PM10</div></div>
      <div class="stat"><div class="stat-v">${pm25Band(aq.current.pm2_5)}</div><div class="stat-l">Rating</div></div>
    </div>
    ${pollenKinds.length
      ? `<div class="pollen">${pollenKinds.map(([k,v]) => `<span class="chip b" style="opacity:.9">${k} ${v.toFixed(0)}</span>`).join("")}</div>`
      : `<p class="fine">Pollen data isn't published for this region.</p>`}
  </section>` : ""}

  <section class="card">
    <div class="card-eyebrow">Mold risk</div>
    <div class="mold-row">
      <div><div class="mold-big">${Math.round(settings.indoorRH)}%</div>
      <div class="mold-sub">indoor humidity (est.)</div></div>
      <span class="badge" style="background:${mb.tone}">${mb.label}</span>
    </div>
    <p class="fine">A 15-minute airing now would bring indoor humidity toward
      <b style="color:${rhAfter < settings.indoorRH ? "#0E6B5C" : "#8F2F44"}">~${Math.round(rhAfter)}%</b>
      at ${settings.indoorT}°C. Mold thrives above 65%.</p>
    ${spark}
  </section>

  <footer class="ftr">
    <button class="refresh" onclick="fetchAll()">${loading ? "Updating…" : "Refresh"}</button>
    <span>Open-Meteo · ${updatedAt ? updatedAt.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : ""}</span>
  </footer>`;
}

/* ───── sheets ───── */
function openSheet(id) { $(id).classList.remove("hidden"); }
function closeSheets() { $("searchSheet").classList.add("hidden"); $("sensorSheet").classList.add("hidden"); }
document.querySelectorAll(".sheet-bg").forEach(bg => {
  bg.addEventListener("click", e => { if (e.target === bg) closeSheets(); });
});
document.querySelectorAll("[data-close]").forEach(b => b.addEventListener("click", closeSheets));
$("locBtn").addEventListener("click", () => { openSheet("searchSheet"); $("searchIn").focus(); });
$("sensorBtn").addEventListener("click", () => openSheet("sensorSheet"));

/* search */
let searchT = null;
$("searchIn").addEventListener("input", e => {
  const q = e.target.value.trim();
  clearTimeout(searchT);
  if (q.length < 2) { $("searchRes").innerHTML = ""; return; }
  searchT = setTimeout(async () => {
    $("searchRes").innerHTML = `<p class="fine" style="padding:8px 4px">Searching…</p>`;
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=7&language=en`);
      const j = await r.json();
      const res = j.results || [];
      $("searchRes").innerHTML = res.length
        ? res.map((x,i) => `<button class="res-row" data-i="${i}">
            <span class="res-name">${esc(x.name)}</span>
            <span class="res-sub">${esc([x.admin1, x.country].filter(Boolean).join(", "))}</span>
          </button>`).join("")
        : `<p class="fine" style="padding:8px">No matches — try the local spelling.</p>`;
      $("searchRes").querySelectorAll(".res-row").forEach(btn => {
        btn.addEventListener("click", () => {
          const x = res[+btn.dataset.i];
          loc = { name:x.name, country:x.country, lat:x.latitude, lon:x.longitude };
          store.set("owc-loc", loc);
          closeSheets(); $("searchIn").value = ""; $("searchRes").innerHTML = "";
          wx = null; fetchAll();
        });
      });
    } catch { $("searchRes").innerHTML = `<p class="fine" style="padding:8px">Search failed — check your connection.</p>`; }
  }, 320);
});

/* sensor sliders */
$("tSlider").value = settings.indoorT; $("tVal").textContent = settings.indoorT + "°C";
$("hSlider").value = settings.indoorRH; $("hVal").textContent = settings.indoorRH + "%";
$("tSlider").addEventListener("input", e => {
  settings.indoorT = parseFloat(e.target.value);
  $("tVal").textContent = settings.indoorT + "°C";
  store.set("owc-settings", settings); render();
});
$("hSlider").addEventListener("input", e => {
  settings.indoorRH = parseFloat(e.target.value);
  $("hVal").textContent = settings.indoorRH + "%";
  store.set("owc-settings", settings); render();
});

/* boot */
fetchAll();
</script>
</body>
</html>
